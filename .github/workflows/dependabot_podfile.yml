name: Update Podfile.lock for Dependabot

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  update-podfile:
    runs-on: macos-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          # Use the default GITHUB_TOKEN to push the changes
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - run: flutter pub get
        
      - name: Update Pods
        working-directory: ios
        run: |
          pod repo update
          pod install
          
      - name: Commit Podfile.lock
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ios/Podfile.lock
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update Podfile.lock [skip ci]" && git push)
